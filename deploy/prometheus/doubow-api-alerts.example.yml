# Example Prometheus alert rules for Doubow API gateway.
# Copy into your Prometheus config and adjust metric names/labels to match your scrape setup.
# Histograms from services/metrics.py typically expose _bucket / _sum / _count suffixes.

groups:
  - name: doubow-api
    rules:
      - alert: DoubowAPIDown
        expr: up{job="doubow-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Doubow API target is down"
          description: "Prometheus cannot scrape the API for 2m. Check pods/processes and load balancer."

      - alert: DoubowHigh5xxRate
        expr: |
          sum(rate(doubow_api_requests_total{job="doubow-api",status_code=~"5.."}[5m]))
            /
          sum(rate(doubow_api_requests_total{job="doubow-api"}[5m])) > 0.01
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Elevated 5xx rate on Doubow API"
          description: "More than 1% of API responses are 5xx over 10m based on `doubow_api_requests_total`."

      - alert: DoubowLaunchCoreRoutes5xx
        expr: |
          (
            sum(rate(doubow_api_requests_total{job="doubow-api",path=~"/v1/jobs|/v1/me/applications|/v1/me/approvals|/v1/agents/chat",status_code=~"5.."}[10m]))
            /
            sum(rate(doubow_api_requests_total{job="doubow-api",path=~"/v1/jobs|/v1/me/applications|/v1/me/approvals|/v1/agents/chat"}[10m]))
          ) > 0.0025
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Launch-critical route 5xx budget exceeded"
          description: "Combined 5xx rate >0.25% for launch-critical routes over 10m."

      - alert: DoubowLLMErrorBurst
        expr: |
          sum(rate(doubow_llm_calls_total{status="error"}[10m])) > 0.05
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "OpenRouter / LLM errors elevated"
          description: "Metric `doubow_llm_calls_total` from services/metrics.py; verify labels at GET /metrics."
