name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard deprecated frontend runtime paths
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            BASE_REF="origin/${GITHUB_BASE_REF}"
          else
            BASE_REF="HEAD~1"
          fi
          CHANGED="$(git diff --name-only "${BASE_REF}"...HEAD || true)"
          if [[ -z "${CHANGED}" ]]; then
            echo "No changed files to validate."
            exit 0
          fi
          if echo "${CHANGED}" | rg -n '^(frontend/(app|components|hooks|lib|stores)/|frontend/(middleware\.ts|next\.config\.js|playwright\.config\.ts|postcss\.config\.js|tailwind\.config\.js|tsconfig\.json|next-env\.d\.ts)$)'; then
            echo "Deprecated frontend runtime paths were modified. Use apps/web instead."
            exit 1
          fi
          echo "Frontend path guard passed."
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @doubow/web lint
      - run: npm run -w @doubow/web type-check
      - run: npm run -w @doubow/web build

  backend-migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doubow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d doubow_ci"
          --health-interval=3s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/api_gateway/requirements.txt psycopg2-binary pytest pytest-asyncio httpx aiosqlite
      - name: Verify Alembic migration chain compiles (offline SQL)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          PYTHONPATH: backend/api_gateway
        run: |
          python -m alembic -c backend/api_gateway/alembic.ini upgrade head --sql > /tmp/alembic.sql
          test -s /tmp/alembic.sql
      - name: Apply migrations to Postgres (online)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          PYTHONPATH: backend/api_gateway
        run: |
          python -m alembic -c backend/api_gateway/alembic.ini upgrade head
      - name: Run backend test suite
        env:
          PYTHONPATH: backend/api_gateway
          CI_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
        run: |
          python -m pytest -q backend/api_gateway/tests
      - name: Run LangChain resume integration guardrail
        env:
          PYTHONPATH: backend/api_gateway
          CI_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
        run: |
          python -m pytest -q backend/api_gateway/tests/integration/test_resume_langchain_integration.py
