name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard removed legacy frontend path
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            BASE_REF="origin/${GITHUB_BASE_REF}"
          else
            BASE_REF="HEAD~1"
          fi
          CHANGED="$(git diff --name-only "${BASE_REF}"...HEAD || true)"
          if [[ -z "${CHANGED}" ]]; then
            echo "No changed files to validate."
            exit 0
          fi
          if echo "${CHANGED}" | rg -n '^frontend/'; then
            echo "Legacy frontend path was modified, but frontend/ has been removed. Use apps/web instead."
            exit 1
          fi
          echo "Legacy frontend path guard passed."
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @doubow/web lint
      - run: npm run -w @doubow/web type-check
      - run: npm run -w @doubow/web build

  backend-migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doubow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d doubow_ci"
          --health-interval=3s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          STEP_START="$(date +%s)"
          echo "[timing] install deps start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python -m pip install --upgrade pip
          pip install -r backend/api_gateway/requirements.txt psycopg2-binary pytest pytest-asyncio httpx aiosqlite
          STEP_END="$(date +%s)"
          echo "[timing] install deps end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((STEP_END-STEP_START))s)"
      - name: Verify Alembic migration chain compiles (offline SQL)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          PYTHONPATH: backend/api_gateway
        run: |
          STEP_START="$(date +%s)"
          echo "[timing] alembic offline start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python -m alembic -c backend/api_gateway/alembic.ini upgrade head --sql > /tmp/alembic.sql
          test -s /tmp/alembic.sql
          STEP_END="$(date +%s)"
          echo "[timing] alembic offline end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((STEP_END-STEP_START))s)"
      - name: Apply migrations to Postgres (online)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          PYTHONPATH: backend/api_gateway
        run: |
          STEP_START="$(date +%s)"
          echo "[timing] alembic online start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python -m alembic -c backend/api_gateway/alembic.ini upgrade head
          STEP_END="$(date +%s)"
          echo "[timing] alembic online end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((STEP_END-STEP_START))s)"
      - name: Run backend test suite
        env:
          PYTHONPATH: backend/api_gateway
          CI_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
        run: |
          run_timed() {
            local label="$1"
            local timeout_window="$2"
            shift 2
            local step_start
            local step_end
            local exit_code
            step_start="$(date +%s)"
            echo "[timing] ${label} start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            timeout "${timeout_window}" "$@"
            exit_code="$?"
            step_end="$(date +%s)"
            echo "[timing] ${label} end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((step_end-step_start))s)"
            if [ "${exit_code}" -eq 124 ]; then
              echo "[timing] ${label} command timed out after ${timeout_window}"
            fi
            if [ "${exit_code}" -ne 0 ]; then
              exit "${exit_code}"
            fi
          }
          run_timed "backend tests" "15m" python -m pytest -q backend/api_gateway/tests
      - name: Run durability and ops readiness guardrails
        env:
          PYTHONPATH: backend/api_gateway
          CI_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
        run: |
          run_timed() {
            local label="$1"
            local timeout_window="$2"
            shift 2
            local step_start
            local step_end
            local exit_code
            step_start="$(date +%s)"
            echo "[timing] ${label} start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            timeout "${timeout_window}" "$@"
            exit_code="$?"
            step_end="$(date +%s)"
            echo "[timing] ${label} end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((step_end-step_start))s)"
            if [ "${exit_code}" -eq 124 ]; then
              echo "[timing] ${label} command timed out after ${timeout_window}"
            fi
            if [ "${exit_code}" -ne 0 ]; then
              exit "${exit_code}"
            fi
          }
          run_timed "durability guardrails" "10m" python -m pytest -q \
            backend/api_gateway/tests/test_background_durability_guardrails.py \
            backend/api_gateway/tests/test_health_readiness.py \
            backend/api_gateway/tests/test_ingestion_admin_authz.py \
            backend/api_gateway/tests/test_users_debug_endpoint.py
      - name: Run LangChain resume integration guardrail
        env:
          PYTHONPATH: backend/api_gateway
          CI_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
        run: |
          run_timed() {
            local label="$1"
            local timeout_window="$2"
            shift 2
            local step_start
            local step_end
            local exit_code
            step_start="$(date +%s)"
            echo "[timing] ${label} start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            timeout "${timeout_window}" "$@"
            exit_code="$?"
            step_end="$(date +%s)"
            echo "[timing] ${label} end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((step_end-step_start))s)"
            if [ "${exit_code}" -eq 124 ]; then
              echo "[timing] ${label} command timed out after ${timeout_window}"
            fi
            if [ "${exit_code}" -ne 0 ]; then
              exit "${exit_code}"
            fi
          }
          run_timed "resume integration" "10m" python -m pytest -q backend/api_gateway/tests/integration/test_resume_langchain_integration.py
      - name: Run migrated schema parity guardrail
        env:
          PYTHONPATH: backend/api_gateway
          CI_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
        run: |
          run_timed() {
            local label="$1"
            local timeout_window="$2"
            shift 2
            local step_start
            local step_end
            local exit_code
            step_start="$(date +%s)"
            echo "[timing] ${label} start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            timeout "${timeout_window}" "$@"
            exit_code="$?"
            step_end="$(date +%s)"
            echo "[timing] ${label} end: $(date -u +'%Y-%m-%dT%H:%M:%SZ') (elapsed=$((step_end-step_start))s)"
            if [ "${exit_code}" -eq 124 ]; then
              echo "[timing] ${label} command timed out after ${timeout_window}"
            fi
            if [ "${exit_code}" -ne 0 ]; then
              exit "${exit_code}"
            fi
          }
          run_timed "schema parity" "10m" python -m pytest -q backend/api_gateway/tests/integration/test_ci_postgres_schema.py
      - name: List lingering backend processes
        if: always()
        run: |
          ps -eo pid,ppid,etime,cmd | rg -i "python|pytest|alembic|postgres" || true
      - name: Kill lingering pytest/alembic processes
        if: always()
        run: |
          pkill -f "python -m pytest" || true
          pkill -f "python -m alembic" || true

  semantic-eval-nightly:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doubow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d doubow_ci"
          --health-interval=3s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/api_gateway/requirements.txt psycopg2-binary
      - name: Apply migrations to Postgres
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          PYTHONPATH: backend/api_gateway
        run: |
          python -m alembic -c backend/api_gateway/alembic.ini upgrade head
      - name: Run semantic precision quality gates
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doubow_ci
          PYTHONPATH: backend/api_gateway
          SEMANTIC_EVAL_USER_ID: ${{ secrets.SEMANTIC_EVAL_USER_ID }}
        run: |
          if [ -z "${SEMANTIC_EVAL_USER_ID:-}" ]; then
            echo "Missing required secret: SEMANTIC_EVAL_USER_ID"
            exit 1
          fi
          python scripts/semantic_precision_eval.py \
            --user-id "${SEMANTIC_EVAL_USER_ID}" \
            --sample-size 100 \
            --label-mode auto \
            --min-delta-pp 1.5 \
            --min-semantic-precision 0.70
