version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: doubow
      POSTGRES_USER: doubow
      POSTGRES_PASSWORD: doubow
    ports:
      # Host 5433 avoids clashing with a native Postgres install on 5432
      - '5433:5432'
  redis:
    image: redis:7
    ports:
      - '6379:6379'
